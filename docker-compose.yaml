version: "3.8"

services:
  mydb:
    container_name: my_db
    image: postgres:16
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${USER}
      POSTGRES_PASSWORD: ${PASS}
    networks:
      - bridge-network
  redis:
    container_name: redis
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - "redis:/data"
    networks:
      - bridge-network

  myapp:
    build: .
    container_name: my_project
    image: myapp:latest
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://mydb:5432/${DATABASE_NAME}
      SPRING_DATASOURCE_USERNAME: ${USER}
      SPRING_DATASOURCE_PASSWORD: ${PASS}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      - mydb
    networks:
      - bridge-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - bridge-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    restart: unless-stopped
    volumes:
      - ./Datasources.yml:/etc/grafana/Datasources.yml
    networks:
      - bridge-network



networks:
  bridge-network:
    driver: bridge
volumes:
  redis: